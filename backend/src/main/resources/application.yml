server:
  port: 8080

spring:
  application:
    name: pet-rescue
  datasource:
    url: jdbc:mysql://localhost:3306/pet_rescue?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ab123168
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  type-aliases-package: com.rescue.petrescue.entity

# JWT 配置
jwt:
  secret: PetRescueSystemSecretKey2024VeryLongSecretForSecurity
  expiration: 86400000  # 24 hours

# 文件上传配置
upload:
  path: ./upload/

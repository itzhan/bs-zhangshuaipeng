# ============================================================
# 流浪宠物救助系统 - Docker Compose 编排
# 一键启动: docker compose up -d --build
# ============================================================

name: pet-rescue

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: pet-rescue-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ab123168}
      MYSQL_DATABASE: pet_rescue
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-ab123168}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: pet-rescue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ---- 后端 Spring Boot ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-rescue-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pet_rescue?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ab123168}
      SPRING_DATA_REDIS_HOST: redis
      TZ: Asia/Shanghai
    volumes:
      - upload_data:/app/upload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ---- Nginx 统一入口 ----
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: pet-rescue-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
    volumes:
      - upload_data:/usr/share/nginx/upload:ro

volumes:
  mysql_data:
  redis_data:
  upload_data:
